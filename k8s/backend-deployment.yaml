apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-backend
  labels:
    app: trading-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trading-backend
  template:
    metadata:
      labels:
        app: trading-backend
    spec:
      containers:
      - name: backend
        image: trading-backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
---
apiVersion: v1
kind: Service
metadata:
  name: trading-backend
spec:
  selector:
    app: trading-backend
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
  type: ClusterIP
